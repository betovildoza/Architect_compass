<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architect's Compass — Architect_compass</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #1e1e1e;
                 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
    #graph { width: 100vw; height: 100vh; }
    #legend {
      position: fixed; top: 12px; left: 12px;
      background: rgba(0,0,0,0.75); color: #ccc;
      padding: 12px 16px; border-radius: 6px; font-size: 12px; line-height: 1.9;
      z-index: 10; max-width: 280px;
    }
    #legend strong { color: #fff; display: block; margin-bottom: 4px; }
    #legend .meta { color: #888; font-size: 11px; margin-top: 6px; border-top: 1px solid #333; padding-top: 6px; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%;
           margin-right: 6px; vertical-align: middle; }
    .swatch { display: inline-block; width: 20px; height: 3px; margin-right: 6px;
              vertical-align: middle; }
    #controls {
      position: fixed; top: 12px; right: 12px;
      background: rgba(0,0,0,0.75); color: #ccc;
      padding: 8px 12px; border-radius: 6px; font-size: 12px; z-index: 10;
      display: flex; gap: 6px;
    }
    #controls button {
      background: #333; color: #eee; border: 1px solid #555;
      padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 11px;
      font-family: inherit;
    }
    #controls button:hover { background: #444; }
    #status {
      position: fixed; bottom: 12px; left: 12px;
      color: #666; font-size: 11px; z-index: 10;
    }
  </style>
</head>
<body>
<div id="legend">
  <strong>Architect's Compass — Architect_compass</strong>
  <span class="dot" style="background:#4fc3f7"></span>Conectado<br>
  <span class="dot" style="background:#ffb300"></span>Hub (≥5 inbound)<br>
  <span class="dot" style="background:#ffc107;border:1px solid #f39c12"></span>Ambiguo (no detectado)<br>
  <span class="dot" style="background:#fff3cd;border:1px solid #b7791f"></span>Huérfano (explícito)<br>
  <span class="dot" style="background:#fde0dc;border:1px solid #c0392b"></span>En ciclo<br>
  <span class="dot" style="background:#4fc3f7;border:3px solid #fbbf24"></span>Entry point<br>
  <div id="tier-legend" style="margin-top:6px; border-top:1px solid #333; padding-top:6px;">
    <strong style="font-size:11px; color:#aaa; display:block; margin-bottom:4px;">Externals por tier</strong>
  </div>
  <div class="meta">
    2026-04-19 22:09:46<br>
    nodes=35 · edges=108 · cycles=0
  </div>
</div>
<div id="controls">
  <button onclick="fitGraph()">Fit</button>
  <button onclick="togglePhysics()">Toggle Physics</button>
  <button onclick="exportPng()">PNG</button>
</div>
<div id="graph"></div>
<div id="status"></div>
<script>
  // Datos inyectados por graph_emitter.build_graph_html()
  const EDGES_RAW = [["architect_compass.py", "compass/cli.py", "import"], ["architect_symbols.py", "mapper_config.json", "load"], ["architect_symbols.py", ".map/compass.local.json", "load"], ["compass.py", "compass/cli.py", "import"], ["compass/cli.py", "compass/cli_ui.py", "import"], ["compass/cli.py", "compass/cli_ui.py", "import"], ["compass/cli.py", "compass/cli_ui.py", "import"], ["compass/cli.py", "compass/cli_ui.py", "import"], ["compass/cli.py", "compass/cli_ui.py", "import"], ["compass/cli.py", "compass/core.py", "import"], ["compass/cli.py", "compass/template_io.py", "import"], ["compass/cli.py", "compass/template_io.py", "import"], ["compass/cli.py", "compass/template_io.py", "import"], ["compass/cli.py", "compass/graph_emitter.py", "import"], ["compass/cli.py", "architect_symbols.py", "import"], ["compass/cli_ui.py", "[EXTERNAL:rich]", "import"], ["compass/cli_ui.py", "[EXTERNAL:rich]", "import"], ["compass/cli_ui.py", "[EXTERNAL:rich]", "import"], ["compass/cli_ui.py", "[EXTERNAL:rich]", "import"], ["compass/cli_ui.py", "[EXTERNAL:rich]", "import"], ["compass/cli_ui.py", "[EXTERNAL:rich]", "import"], ["compass/cli_ui.py", "[EXTERNAL:rich]", "import"], ["compass/config_loader.py", "compass/template_io.py", "import"], ["compass/config_loader.py", "compass/template_io.py", "import"], ["compass/consolidator.py", "compass/stdlib_filter.py", "import"], ["compass/core.py", "compass/config_loader.py", "import"], ["compass/core.py", "compass/entry_points.py", "import"], ["compass/core.py", "compass/finalize.py", "import"], ["compass/core.py", "compass/finalize.py", "import"], ["compass/core.py", "compass/finalize.py", "import"], ["compass/core.py", "compass/outbound_resolver.py", "import"], ["compass/core.py", "compass/path_resolver.py", "import"], ["compass/core.py", "compass/pipeline.py", "import"], ["compass/core.py", "compass/scan_worker.py", "import"], ["compass/core.py", "compass/scanners/base.py", "import"], ["compass/core.py", "compass/stack_detector.py", "import"], ["compass/core.py", "compass/template_io.py", "import"], ["compass/core.py", "compass/template_io.py", "import"], ["compass/core.py", "compass/template_io.py", "import"], ["compass/core.py", "compass/template_io.py", "import"], ["compass/core.py", "compass/template_io.py", "import"], ["compass/core.py", "compass/template_io.py", "import"], ["compass/core.py", "compass/template_io.py", "import"], ["compass/core.py", "compass/template_io.py", "import"], ["compass/core.py", "compass/template_io.py", "import"], ["compass/core.py", "compass/template_io.py", "import"], ["compass/entry_points.py", "compass/framework_mounts.py", "import"], ["compass/finalize.py", "compass/consolidator.py", "import"], ["compass/finalize.py", "compass/consolidator.py", "import"], ["compass/finalize.py", "compass/graph_emitter.py", "import"], ["compass/finalize.py", "compass/graph_emitter.py", "import"], ["compass/finalize.py", "compass/graph_emitter.py", "import"], ["compass/finalize.py", "compass/dashboard_detector.py", "import"], ["compass/finalize.py", "compass/metrics.py", "import"], ["compass/finalize.py", "compass/metrics.py", "import"], ["compass/finalize.py", "compass/metrics.py", "import"], ["compass/finalize.py", "compass/metrics.py", "import"], ["compass/finalize.py", "compass/metrics.py", "import"], ["compass/finalize.py", "compass/metrics.py", "import"], ["compass/finalize.py", "compass/metrics.py", "import"], ["compass/finalize.py", "compass/validation.py", "import"], ["compass/finalize.py", "compass/template_io.py", "import"], ["compass/finalize.py", "compass/wordpress_detector.py", "import"], ["compass/finalize.py", "compass/wordpress_detector.py", "import"], ["compass/finalize.py", "compass/wordpress_detector.py", "import"], ["compass/graph_emitter.py", "compass/templates/graph.html.tpl", "load"], ["compass/graph_emitter.py", "[EXTERNAL:unpkg.com]", "fetch"], ["compass/outbound_resolver.py", "compass/stdlib_filter.py", "import"], ["compass/path_resolver.py", "compass/framework_mounts.py", "import"], ["compass/path_resolver.py", "compass/defaults.py", "import"], ["compass/pipeline.py", "compass/scanners/__init__.py", "import"], ["compass/pipeline.py", "compass/scanners/__init__.py", "import"], ["compass/pipeline.py", "compass/stack_detector.py", "import"], ["compass/pipeline.py", "compass/defaults.py", "import"], ["compass/pipeline.py", "compass/orphan_classifier.py", "import"], ["compass/pipeline.py", "compass/orphan_classifier.py", "import"], ["compass/scan_worker.py", "compass/scanners/__init__.py", "import"], ["compass/scan_worker.py", "compass/scanners/__init__.py", "import"], ["compass/scan_worker.py", "compass/scanners/base.py", "import"], ["compass/scan_worker.py", "compass/pipeline.py", "import"], ["compass/__init__.py", "compass/core.py", "import"], ["compass/__init__.py", "compass/stack_detector.py", "import"], ["compass/__init__.py", "compass/stack_detector.py", "import"], ["compass/__init__.py", "compass/path_resolver.py", "import"], ["compass/__init__.py", "compass/scanners/__init__.py", "import"], ["compass/scanners/html.py", "compass/scanners/base.py", "import"], ["compass/scanners/html.py", "compass/scanners/base.py", "import"], ["compass/scanners/python.py", "compass/scanners/base.py", "import"], ["compass/scanners/python.py", "compass/path_resolver.py", "import"], ["compass/scanners/python.py", "compass/defaults.py", "import"], ["compass/scanners/regex_fallback.py", "compass/scanners/base.py", "import"], ["compass/scanners/regex_fallback.py", "compass/scanners/base.py", "import"], ["compass/scanners/regex_fallback.py", "compass/path_resolver.py", "import"], ["compass/scanners/treesitter.py", "compass/scanners/base.py", "import"], ["compass/scanners/treesitter.py", "compass/scanners/base.py", "import"], ["compass/scanners/treesitter.py", "compass/scanners/base.py", "import"], ["compass/scanners/treesitter.py", "compass/scanners/base.py", "import"], ["compass/scanners/treesitter.py", "compass/path_resolver.py", "import"], ["compass/scanners/treesitter.py", "compass/scanners/regex_fallback.py", "import"], ["compass/scanners/__init__.py", "compass/scanners/base.py", "import"], ["compass/scanners/__init__.py", "compass/scanners/base.py", "import"], ["compass/scanners/__init__.py", "compass/scanners/base.py", "import"], ["compass/scanners/__init__.py", "compass/scanners/base.py", "import"], ["compass/scanners/__init__.py", "compass/scanners/base.py", "import"], ["compass/scanners/__init__.py", "compass/scanners/html.py", "import"], ["compass/scanners/__init__.py", "compass/scanners/python.py", "import"], ["compass/scanners/__init__.py", "compass/scanners/regex_fallback.py", "import"], ["compass/scanners/__init__.py", "compass/scanners/treesitter.py", "import"]];
  const EXTERNALS = new Set(["[EXTERNAL:rich]", "[EXTERNAL:unpkg.com]"]);
  const ORPHANS = new Set([]);
  const AMBIGUOUS = new Set(["cli_roadmap.html"]);
  const CYCLES_NODES = new Set([]);
  const EDGE_COLORS = {"import": "#1f7a1f", "require": "#333333", "include": "#555555", "src": "#1f5fbf", "href": "#2e86de", "action": "#8e44ad", "fetch": "#c0392b", "enqueue": "#7d3c98", "use": "#888888"};
  // TIER-035 — tier semántico por external label + colores por tier.
  const EXTERNAL_TIERS = {"[EXTERNAL:rich]": "package", "[EXTERNAL:unpkg.com]": "service"};
  const TIER_COLORS = {"stdlib": "#9ca3af", "package": "#60a5fa", "service": "#a78bfa", "wrapper": "#f59e0b"};
  // GRAPH-036 — entry points (paths posix) + style.
  const ENTRY_POINTS = new Set(["architect_compass.py", "architect_symbols.py", "compass.py", "compass/cli.py", "compass/framework_mounts.py"]);
  const EP_BORDER_COLOR = "#fbbf24";
  const EP_BORDER_WIDTH = 4;
  const EP_SIZE_BOOST = 10;
  const EP_LABEL_PREFIX = "";

  // TIER-035 — darken helper (para borderColor por tier).
  function _darken(hex) {
    const h = (hex || "").replace("#", "");
    if (h.length !== 6) return "#333";
    const r = Math.max(0, parseInt(h.slice(0,2),16) - 48);
    const g = Math.max(0, parseInt(h.slice(2,4),16) - 48);
    const b = Math.max(0, parseInt(h.slice(4,6),16) - 48);
    return "#" + [r,g,b].map(v => v.toString(16).padStart(2,"0")).join("");
  }

  // TIER-035 — poblar leyenda de tiers dinámicamente con los tiers presentes.
  (function populateTierLegend() {
    const tierLegend = document.getElementById("tier-legend");
    if (!tierLegend) return;
    const presentTiers = new Set();
    EXTERNALS.forEach(name => {
      const t = EXTERNAL_TIERS[name] || "package";
      presentTiers.add(t);
    });
    const order = ["service", "wrapper", "package", "stdlib"];
    order.filter(t => presentTiers.has(t)).forEach(t => {
      const c = TIER_COLORS[t] || "#888";
      const row = document.createElement("div");
      row.innerHTML =
        '<span class="dot" style="background:' + c + ';border:1px solid ' + _darken(c) + '"></span>' +
        '<span style="text-transform:capitalize">' + t + '</span>';
      tierLegend.appendChild(row);
    });
  })();

  // contar inbound por nodo
  const inbound = {};
  EDGES_RAW.forEach(e => { inbound[e[1]] = (inbound[e[1]]||0) + 1; });

  // recolectar TODOS los node names (sources + targets + externals registrados
  // aunque no aparezcan en edges).
  const allNames = new Set();
  EDGES_RAW.forEach(e => { allNames.add(e[0]); allNames.add(e[1]); });
  EXTERNALS.forEach(n => allNames.add(n));
  ORPHANS.forEach(n => allNames.add(n));
  AMBIGUOUS.forEach(n => allNames.add(n));
  ENTRY_POINTS.forEach(n => allNames.add(n));

  // construir nodos únicos
  const nodeMap = {};
  let idSeq = 1;
  allNames.forEach(name => {
    if (nodeMap[name]) return;
    const isExternal = EXTERNALS.has(name);
    const isOrphan  = ORPHANS.has(name);
    const isAmbiguous = AMBIGUOUS.has(name);
    const isCycle   = CYCLES_NODES.has(name);
    const isHub     = (inbound[name]||0) >= 5;
    const isEntry   = ENTRY_POINTS.has(name);
    let color = "#4fc3f7";
    let borderColor = "#2a7ca8";
    let borderWidth = 1;
    if (isExternal) {
      // TIER-035 — color por tier.
      const tier = EXTERNAL_TIERS[name] || "package";
      color = TIER_COLORS[tier] || "#ef5350";
      borderColor = _darken(color);
    }
    else if (isCycle)    { color = "#fde0dc"; borderColor = "#c0392b"; }
    else if (isAmbiguous){ color = "#ffc107"; borderColor = "#f39c12"; }
    else if (isOrphan)   { color = "#fff3cd"; borderColor = "#b7791f"; }
    else if (isHub)      { color = "#ffb300"; borderColor = "#a07700"; }
    // GRAPH-036 — entry point: override borde + engordar.
    if (isEntry && !isExternal) {
      borderColor = EP_BORDER_COLOR;
      borderWidth = EP_BORDER_WIDTH;
    }
    let baseLabel = name.length > 34 ? "…" + name.slice(-32) : name;
    if (isEntry && EP_LABEL_PREFIX) baseLabel = EP_LABEL_PREFIX + " " + baseLabel;
    const titleExtras = [];
    titleExtras.push("inbound: " + (inbound[name]||0));
    if (isExternal) titleExtras.push("tier: " + (EXTERNAL_TIERS[name] || "package"));
    if (isEntry) titleExtras.push("entry point");
    nodeMap[name] = {
      id: idSeq++,
      label: baseLabel,
      title: name + "\n" + titleExtras.join("\n"),
      color: { background: color, border: borderColor,
               highlight: { background: color, border: "#fff" } },
      font: { color: "#000", size: 11, face: "Arial" },
      shape: isExternal ? "ellipse" : "box",
      size: (isHub ? 22 : 14) + (isEntry ? EP_SIZE_BOOST : 0),
      borderWidth: borderWidth,
    };
  });

  const nodes = Object.values(nodeMap);
  const edges = EDGES_RAW.map(e => {
    const src = e[0], tgt = e[1], etype = e[2] || "use";
    const ecolor = EDGE_COLORS[etype] || "#666";
    return {
      from: nodeMap[src].id,
      to: nodeMap[tgt].id,
      arrows: "to",
      label: etype,
      font: { color: "#888", size: 9, align: "middle",
              background: "rgba(30,30,30,0.7)", strokeWidth: 0 },
      color: { color: ecolor, highlight: "#fff", opacity: 0.7 },
      width: 1,
      smooth: { type: "continuous" },
    };
  });

  const container = document.getElementById("graph");
  const data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
  const options = {
    physics: {
      enabled: true,
      stabilization: { iterations: 200, updateInterval: 25 },
      barnesHut: { gravitationalConstant: -9000, springLength: 140,
                   springConstant: 0.04, damping: 0.3 },
    },
    interaction: { hover: true, tooltipDelay: 120, zoomView: true,
                   dragView: true, navigationButtons: false },
    edges: { smooth: { type: "continuous" } },
    nodes: { borderWidth: 1, font: { color: "#000000" } },
  };
  const network = new vis.Network(container, data, options);

  const status = document.getElementById("status");
  network.on("stabilizationProgress", p => {
    status.textContent = "Stabilizing… " + Math.round(100 * p.iterations / p.total) + "%";
  });
  network.on("stabilizationIterationsDone", () => {
    status.textContent = "Ready · scroll=zoom · drag=pan · click=highlight";
    setTimeout(() => { status.textContent = ""; }, 4000);
  });

  function fitGraph() { network.fit({ animation: { duration: 400 } }); }
  let physicsOn = true;
  function togglePhysics() {
    physicsOn = !physicsOn;
    network.setOptions({ physics: { enabled: physicsOn } });
  }
  function exportPng() {
    const canvas = container.getElementsByTagName("canvas")[0];
    if (!canvas) return;
    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = "Architect_compass-graph.png";
    a.click();
  }
</script>
</body>
</html>
